<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Card Market Terminal</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
margin:0;
}

h1{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
border:1px solid #334155;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.name{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.price{
font-size:26px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

.store{
color:#94a3b8;
margin-top:5px;
}

.trend{
margin-top:10px;
font-weight:bold;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

#products{
margin-top:20px;
}
</style>

</head>
<body>

<h1>🏈 Sports Card Market Terminal</h1>

<div id="products" class="grid"></div>

<script>

fetch('products.json')
.then(response => response.json())
.then(products => {

const container = document.getElementById('products');

products.forEach(product => {

const trendClass =
product.trend.includes('-')
? 'down'
: 'up';

container.innerHTML += `
<div class="card">

<img src="${product.image}">

<div class="name">
${product.name}
</div>

<div class="price">
$${product.price}
</div>

<div class="store">
Best Store: ${product.store}
</div>

<div class="trend ${trendClass}">
${product.trend}
</div>

</div>
`;

});

});

</script>

</body>
</html>
