<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Card Market Terminal</title>

<style>
body{<body>

<h1>🏈 Sports Card Market Terminal</h1>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<input
id="searchBox"
type="text"
placeholder="Search products..."
style="
padding:10px;
border:none;
border-radius:8px;
width:250px;
font-size:16px;
.filter-btn{
background:#1e293b;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.filter-btn:hover{
background:#334155;
}
">

<button class="filter-btn" data-sport="All">All</button>
<button class="filter-btn" data-sport="Football">Football</button>
<button class="filter-btn" data-sport="Baseball">Baseball</button>
<button class="filter-btn" data-sport="Basketball">Basketball</button>

</div>

<div id="products" class="grid"></div>

<script>

let allProducts = [];
let currentSport = "All";

function renderProducts(){

const container = document.getElementById('products');

const searchText =
document.getElementById('searchBox')
.value
.toLowerCase();

container.innerHTML = '';

const filteredProducts =
allProducts.filter(product => {

const matchesSearch =
product.name
.toLowerCase()
.includes(searchText);

const matchesSport =
currentSport === 'All'
||
product.sport === currentSport;

return matchesSearch && matchesSport;

});

filteredProducts.forEach(product => {

const trendClass =
product.trend.includes('-')
? 'down'
: 'up';

container.innerHTML += `
<div class="card">

<img src="${product.image}">

<div class="name">
${product.name}
</div>

<div class="price">
$${product.price}
</div>

<div class="store">
Best Store: ${product.store}
</div>

<div class="trend ${trendClass}">
${product.trend}
</div>

</div>
`;

});

}

fetch('products.json')
.then(response => response.json())
.then(products => {

allProducts = products;

renderProducts();

});

document.addEventListener('input', e => {

if(e.target.id === 'searchBox'){

renderProducts();

}

});

document.querySelectorAll('.filter-btn')
.forEach(button => {

button.addEventListener('click', () => {

currentSport =
button.dataset.sport;

renderProducts();

});

});

</script>

</body>

</body>
</html>
