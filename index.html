<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Card Market Terminal</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1,h2{
    margin-bottom:15px;
}

.toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

#searchBox{
    padding:10px;
    border:none;
    border-radius:8px;
    width:250px;
    font-size:16px;
}

.filter-btn{
    background:#1e293b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.filter-btn:hover{
    background:#334155;
}

#watchlistPanel{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    min-height:50px;
}

.watch-item{
    background:#334155;
    padding:8px 12px;
    border-radius:8px;
    margin:5px;
    display:inline-block;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    border:1px solid #334155;
}

.card img{
 .card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:contain;
    background:#0f172a;
    border-radius:8px;
    padding:10px;
}
}
}

.name{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.price{
    font-size:26px;
    font-weight:bold;
    color:#22c55e;
    margin-top:10px;
}

.store{
    color:#94a3b8;
    margin-top:5px;
}

.trend{
    margin-top:10px;
    font-weight:bold;
}

.up{
    color:#22c55e;
}

.down{
    color:#ef4444;
}

.watch-btn{
    margin-top:12px;
    width:100%;
    background:#f59e0b;
    border:none;
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>🏈 Sports Card Market Terminal</h1>
    <div id="bestDealsBoard" style="
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #334155;
">
<h2>🏆 Best Deals Right Now</h2>
<div id="bestDealsList"></div>
</div>
<h2>🏆 Best Deals Right Now</h2>
<div id="bestDealsPanel"></div>

<h2>🔥 Hot Products</h2>
<div id="hotProductsPanel"></div>
<h2>⭐ Your Watchlist</h2>
<div id="watchlistPanel"></div>

<div class="toolbar">
    <input
        id="searchBox"
        type="text"
        placeholder="Search products..."
    >

```
<button class="filter-btn" data-sport="All">All</button>
<button class="filter-btn" data-sport="Football">Football</button>
<button class="filter-btn" data-sport="Baseball">Baseball</button>
<button class="filter-btn" data-sport="Basketball">Basketball</button>
```

</div>

<div id="products" class="grid"></div>

<script>

let allProducts = [];
    function getMarketScore(product){

    const trend =
    parseFloat(
        product.trend.replace("%","")
    );

    const price =
    parseFloat(product.price);

    const valueScore =
    Math.max(0,100-(price/5));

    return Math.round(
        (trend*6) +
        valueScore
    );

}
let currentSport = "All";

let watchlist =
JSON.parse(
localStorage.getItem("watchlist")
) || [];

function renderWatchlist(){

    const panel =
    document.getElementById("watchlistPanel");

    if(watchlist.length === 0){
        panel.innerHTML =
        "No items watched yet.";
        return;
    }

    panel.innerHTML = "";

    watchlist.forEach(item => {

        panel.innerHTML += `
            <div class="watch-item">
                ⭐ ${item}
            </div>
        `;

    });

}

function toggleWatchlist(productName){

    if(watchlist.includes(productName)){

        watchlist =
        watchlist.filter(
            item => item !== productName
        );

    }else{

        watchlist.push(productName);

    }

    localStorage.setItem(
        "watchlist",
        JSON.stringify(watchlist)
    );

    renderWatchlist();

}

function renderProducts(){

    const container =
    document.getElementById("products");

    const searchText =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    container.innerHTML = "";

    const filteredProducts =
    allProducts.filter(product => {

        const matchesSearch =
        product.name
        .toLowerCase()
        .includes(searchText);

        const matchesSport =
        currentSport === "All" ||
        product.sport === currentSport;

        return matchesSearch &&
        matchesSport;

    });

    filteredProducts.forEach(product => {

        const trendClass =
        product.trend.includes("-")
        ? "down"
        : "up";

        container.innerHTML += `
        <div class="card">

            <img src="${product.image}" alt="${product.name}">

            <div class="name">
                ${product.name}
            </div>

            <div class="price">
                $${product.price}
            </div>

            <div class="store">
                Best Store: ${product.store}
            </div>

            <div class="trend ${trendClass}">
                ${product.trend}
            </div>

            <button
            class="watch-btn"
            onclick="toggleWatchlist('${product.name}')">
            ⭐ Watch
            </button>

        </div>
        `;

    });

}
function renderBestDeals(){

    const board =
    document.getElementById(
        "bestDealsList"
    );

    if(!board) return;

    const ranked =
    [...allProducts]
    .sort(
        (a,b)=>
        getMarketScore(b)
        -
        getMarketScore(a)
    )
    .slice(0,5);

    board.innerHTML = "";

    ranked.forEach((product,index)=>{

        const medals =
        ["🥇","🥈","🥉","4️⃣","5️⃣"];

        board.innerHTML += `
        <div style="
        padding:10px;
        margin-bottom:8px;
        background:#334155;
        border-radius:8px;
        ">
            <strong>
            ${medals[index]}
            ${product.name}
            </strong>
            <br>
            Score:
            ${getMarketScore(product)}
            <br>
            Price:
            $${product.price}
        </div>
        `;

    });

}
fetch("products.json")
.then(response => response.json())
.then(products => {

    allProducts = products;

    renderProducts();

});

document.getElementById("searchBox")
.addEventListener(
    "input",
    renderProducts
);

document
.querySelectorAll(".filter-btn")
.forEach(button => {

    button.addEventListener(
        "click",
        () => {

            currentSport =
            button.dataset.sport;

            renderProducts();

        }
    );

});

renderWatchlist();

</script>

</body>
</html>
